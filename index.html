<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>下一个时辰</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600;700&family=Cormorant+Garamond:wght@400;600&family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Liu+Jian+Mao+Cao&family=Long+Cang&family=Zhi+Mang+Xing&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.cnpmjs.org/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet" onerror="">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>if(typeof JSZip==='undefined'){const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';document.head.appendChild(s)}</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F5F0E8;--paper:#FAF7F2;--cream:#FFF8EE;--ink:#3A322A;--ink-light:#6B5E52;--ink-faint:#A89888;--ink-ghost:#C8BBAD;--sand:#C8B598;--sand-light:#E2D5C3;--sand-lighter:#EDE6DA;--terracotta:#C4836A;--terra-soft:rgba(196,131,106,.10);--pool-dark:#2A231C;--pool-mid:#4A3F35}
html,body{height:100%;height:100dvh;overflow:hidden;overscroll-behavior:none;-webkit-overflow-scrolling:auto}
body{background:var(--bg);color:var(--ink);font-family:'Noto Serif SC','Georgia','SimSun',serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;touch-action:none;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
#canvas{display:block;position:fixed;top:0;left:0;cursor:crosshair;touch-action:none}

/* Settings overlay */
#so{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg)}#so.hidden{display:none}
.warm-glow{position:absolute;width:55vw;height:55vw;max-width:600px;max-height:600px;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(255,248,235,.7) 0%,transparent 68%);filter:blur(50px);pointer-events:none}
.panel{position:relative;z-index:2;background:var(--paper);border:1px solid var(--sand-light);border-radius:20px;padding:36px 38px 30px;width:450px;max-width:92vw;max-height:90vh;overflow-y:auto;box-shadow:0 4px 40px rgba(58,50,42,.06)}
.panel::-webkit-scrollbar{width:4px}.panel::-webkit-scrollbar-thumb{background:var(--sand-light);border-radius:2px}
.deco{width:40px;height:1px;background:var(--sand);margin:0 auto 18px;opacity:.55}
.panel h1{font-family:'ZCOOL XiaoWei',serif;font-size:28px;text-align:center;font-weight:400;letter-spacing:5px;margin-bottom:4px}
.panel .sub{text-align:center;font-size:12px;color:var(--ink-faint);margin-bottom:28px;letter-spacing:.8px;line-height:1.7}
.field{margin-bottom:18px}.fl{display:block;font-size:11.5px;color:var(--ink-light);margin-bottom:6px;letter-spacing:.5px}.fl .opt{color:var(--ink-ghost);font-size:10.5px}
.field input,.field textarea,.field select{width:100%;padding:9px 14px;border-radius:9px;background:var(--cream);border:1px solid var(--sand-light);color:var(--ink);font-family:inherit;font-size:13px;outline:none;transition:border-color .25s;letter-spacing:.6px}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--sand)}
.field textarea{resize:vertical;min-height:60px;line-height:1.7}
.field select{cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%23A89888'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 12px;border-radius:20px;background:transparent;border:1px solid var(--sand-light);font-size:12px;cursor:pointer;transition:all .25s;color:var(--ink-light);letter-spacing:.3px;display:inline-flex;align-items:center;gap:4px}
.chip .ic{font-size:10px;opacity:.5}.chip:hover{border-color:var(--sand);color:var(--ink)}.chip.on{background:var(--terra-soft);border-color:rgba(196,131,106,.4);color:var(--terracotta)}
.upload-zone{border:1.5px dashed var(--sand-light);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all .25s;color:var(--ink-faint);font-size:12px;line-height:1.5}
.upload-zone:hover{border-color:var(--sand);background:rgba(255,248,238,.5)}.upload-zone.has-file{border-style:solid;border-color:var(--terracotta);color:var(--terracotta);background:var(--terra-soft)}
.upload-zone input{display:none}.file-info{font-size:10.5px;color:var(--ink-ghost);margin-top:5px;line-height:1.4}
.ctrigger{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink-ghost);cursor:pointer;margin-bottom:10px;letter-spacing:.4px;transition:color .2s}.ctrigger:hover{color:var(--ink-faint)}.ctrigger .arr{display:inline-block;transition:transform .25s;font-size:9px}.ctrigger .arr.open{transform:rotate(90deg)}
.cbody{overflow:hidden;max-height:0;transition:max-height .35s ease;opacity:0}.cbody.open{max-height:300px;opacity:1;transition:max-height .35s ease,opacity .3s ease .1s}
.sep{width:100%;height:1px;background:var(--sand-light);margin:22px 0 18px}
.btn-go{display:block;width:100%;padding:13px 0;background:var(--ink);border:none;border-radius:11px;color:var(--cream);font-family:'Noto Serif SC',serif;font-size:14px;cursor:pointer;transition:all .3s;letter-spacing:4px}.btn-go:hover{background:var(--pool-mid);transform:translateY(-1px);box-shadow:0 8px 24px rgba(58,50,42,.1)}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;padding:11px 18px;display:none;align-items:center;gap:12px;z-index:10;background:linear-gradient(to bottom,rgba(245,240,232,.92) 50%,transparent);pointer-events:none}#hud.show{display:flex}#hud>*{pointer-events:auto}
.hud-brand{font-family:'ZCOOL XiaoWei',serif;font-size:14px;color:var(--ink);letter-spacing:3px;opacity:.5;white-space:nowrap}
.hud-prog{flex:1;max-width:160px;display:flex;flex-direction:column;gap:3px}.hud-prog-top{font-size:10px;color:var(--ink-faint);display:flex;justify-content:space-between}
.hud-bar{height:3px;background:var(--sand-lighter);border-radius:2px;overflow:hidden}.hud-fill{height:100%;width:0%;border-radius:2px;background:linear-gradient(90deg,var(--sand),var(--terracotta));transition:width .4s}
.hud-stat{font-size:11px;color:var(--ink-faint);white-space:nowrap}.hud-stat b{color:var(--ink);font-size:12px;font-weight:600}
#hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--ink-ghost);z-index:10;pointer-events:none;letter-spacing:1.5px;animation:breathe 3.5s ease-in-out infinite}#hint.gone{opacity:0;transition:opacity .6s}
#ai-toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:rgba(250,247,242,.96);border:1px solid var(--sand-light);border-radius:24px;padding:8px 20px;font-size:12px;color:var(--ink-light);z-index:50;display:none;align-items:center;gap:8px;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}#ai-toast.show{display:flex}.spinner{width:12px;height:12px;border:2px solid var(--sand-light);border-top-color:var(--terracotta);border-radius:50%;animation:spin .9s linear infinite}

/* Reveal */
#reveal{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center}#reveal.show{display:flex}
.rv-glow{position:absolute;width:50%;height:50%;top:25%;left:25%;border-radius:50%;background:radial-gradient(circle,rgba(255,245,225,.55) 0%,transparent 60%);filter:blur(50px);pointer-events:none}
.rv-line{width:1px;height:48px;background:linear-gradient(to bottom,transparent,var(--sand));margin-bottom:22px;animation:fadeD 1s ease .15s both}
.rv-tag{font-size:11px;color:var(--ink-faint);letter-spacing:9px;margin-bottom:26px;animation:fadeU 1s ease .3s both}
.rv-sentence{font-family:'ZCOOL XiaoWei',serif;font-size:clamp(22px,4.8vw,50px);color:var(--ink);text-align:center;max-width:78%;line-height:1.85;letter-spacing:4px;font-weight:400;animation:fadeU 1.3s ease .55s both}
.rv-reason{font-size:13px;color:var(--ink-faint);margin-top:20px;max-width:55%;text-align:center;line-height:1.7;animation:fadeU 1s ease .85s both;font-style:italic}
.rv-sep{width:36px;height:1px;background:var(--sand);margin:32px 0;opacity:.45;animation:fadeU .8s ease 1.05s both}
.rv-stats{display:flex;gap:44px;animation:fadeU 1s ease 1.15s both}.rv-stat{text-align:center}.rv-num{font-size:24px;color:var(--ink);font-weight:400;font-family:'Cormorant Garamond',serif}.rv-lbl{font-size:10px;color:var(--ink-ghost);margin-top:4px;letter-spacing:1.5px}
.btn-again{margin-top:36px;padding:10px 34px;background:transparent;border:1px solid var(--sand-light);border-radius:9px;color:var(--ink-light);font-family:inherit;font-size:12px;cursor:pointer;transition:all .3s;letter-spacing:3px;animation:fadeU 1s ease 1.35s both}.btn-again:hover{border-color:var(--sand);color:var(--ink)}

/* ═══ TUNING PANEL ═══ */
#tune-btn{position:fixed;top:12px;right:16px;z-index:20;width:32px;height:32px;border-radius:8px;background:rgba(250,247,242,.8);border:1px solid var(--sand-light);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:16px;color:var(--ink-faint);transition:all .2s;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
#tune-btn.show{display:flex}#tune-btn:hover{background:var(--paper);color:var(--ink);border-color:var(--sand)}
#tune{position:fixed;top:0;right:0;bottom:0;width:280px;background:rgba(250,247,242,.97);border-left:1px solid var(--sand-light);z-index:30;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;padding:16px 18px 24px;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
#tune.open{transform:translateX(0)}
#tune::-webkit-scrollbar{width:3px}#tune::-webkit-scrollbar-thumb{background:var(--sand-light);border-radius:2px}
#tune h3{font-size:11px;color:var(--terracotta);letter-spacing:2px;margin:16px 0 10px;padding-bottom:4px;border-bottom:1px solid var(--sand-lighter);text-transform:uppercase}
#tune h3:first-child{margin-top:4px}
.tune-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tune-label{font-size:10.5px;color:var(--ink-light);letter-spacing:.3px;flex-shrink:0}
.tune-val{font-size:10px;color:var(--ink-faint);min-width:32px;text-align:right;font-family:'Cormorant Garamond',serif;font-size:12px}
.tune-slider{-webkit-appearance:none;appearance:none;width:90px;height:3px;border-radius:2px;background:var(--sand-lighter);outline:none;margin:0 8px;flex-shrink:1}
.tune-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--ink-faint);cursor:pointer;border:2px solid var(--paper);transition:background .2s}
.tune-slider::-webkit-slider-thumb:hover{background:var(--terracotta)}
.tune-select{-webkit-appearance:none;appearance:none;padding:3px 8px;border-radius:6px;border:1px solid var(--sand-light);background:var(--cream);color:var(--ink);font-size:10px;outline:none;cursor:pointer;max-width:120px;font-family:inherit}
.tune-select:focus{border-color:var(--sand)}
.tune-close{position:sticky;top:0;background:rgba(250,247,242,.95);padding:4px 0 8px;display:flex;justify-content:space-between;align-items:center;z-index:1}
.tune-close span{font-size:11px;color:var(--ink-faint);letter-spacing:1px}
.tune-close button{background:none;border:none;font-size:16px;cursor:pointer;color:var(--ink-faint);padding:2px 4px}

@keyframes fadeU{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeD{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes breathe{0%,100%{opacity:.3}50%{opacity:.6}}
</style>
</head>
<body>
<!-- Settings -->
<div id="so"><div class="warm-glow"></div><div class="panel"><div class="deco"></div>
<h1>下一个时辰</h1>
<p class="sub" id="shichen-display"></p>

<div class="field"><span class="fl">当下的情绪</span>
<div class="chips">
<span class="chip on" data-v="迷茫"><span class="ic">◌</span>迷茫</span>
<span class="chip" data-v="期待"><span class="ic">☀</span>期待</span>
<span class="chip" data-v="忧虑"><span class="ic">☁</span>忧虑</span>
<span class="chip" data-v="平静"><span class="ic">水</span>平静</span>
<span class="chip" data-v="躁动"><span class="ic">火</span>躁动</span>
<span class="chip" data-v="欢喜"><span class="ic">❋</span>欢喜</span>
<span class="chip" data-v="孤独"><span class="ic">月</span>孤独</span>
<span class="chip" data-v="感恩"><span class="ic">✿</span>感恩</span>
<span class="chip" data-v="怀旧"><span class="ic">烟</span>怀旧</span>
<span class="chip" data-v="释然"><span class="ic">风</span>释然</span>
<span class="chip" data-v="倦怠"><span class="ic">落</span>倦怠</span>
<span class="chip" data-v="悲伤"><span class="ic">雨</span>悲伤</span>
<span class="chip" data-v="温柔"><span class="ic">棉</span>温柔</span>
<span class="chip" data-v="坚定"><span class="ic">石</span>坚定</span>
<span class="chip" data-v="好奇"><span class="ic">？</span>好奇</span>
<span class="chip" data-v="羞涩"><span class="ic">朵</span>羞涩</span>
</div></div>

<div class="field"><span class="fl">当下的偏爱 <span class="opt">（命签会主动寻找这些字）</span></span>
<input type="text" id="inp-fav" autocomplete="off" placeholder="随心写几个字…  光  远方  自由"></div>

<div class="field"><span class="fl">当下想要选择的文本</span>
<select id="inp-src">
<option value="default">默认 · 自我肯定</option>
<option value="poetry">唐诗三百首</option>
<option value="songci">宋词选</option>
<option value="daodejing">道德经</option>
<option value="xiaoyaoyou">庄子·逍遥游</option>
<option value="philosophy">哲学语录</option>
<option value="yijing">易经 · 周易</option>
<option value="news">当代新闻</option>
<option value="file">上传文件 (MD / EPUB / TXT)</option>
<option value="custom">直接粘贴</option>
</select></div>

<div class="field" id="file-wrap" style="display:none">
<div class="upload-zone" id="drop-zone"><div>📄 点击选择或拖放文件<br><span style="font-size:10px;opacity:.6">.md / .epub / .txt</span></div>
<input type="file" id="file-input" accept=".md,.epub,.txt,.text,.markdown"></div>
<div class="file-info" id="file-info"></div></div>
<div class="field" id="custom-wrap" style="display:none"><span class="fl">粘贴文字</span><textarea id="inp-custom" placeholder="粘贴…"></textarea></div>

<!-- API hidden: triple-tap the deco line to reveal -->
<div class="cbody" id="api-body">
<div class="field"><span class="fl">API 地址</span><input type="text" id="inp-api-url" autocomplete="off" value="https://api.moonshot.cn/v1/chat/completions"></div>
<div class="field"><span class="fl">API Key</span><input type="password" id="inp-api-key" autocomplete="off" data-1p-ignore value="sk-rJECXVRv1JHkzBa2kw0iBtkoSdHI82eYHRMzfvJzrcHZ57GU"></div>
<div class="field"><span class="fl">模型</span><input type="text" id="inp-api-model" autocomplete="off" value="moonshot-v1-32k"></div>
</div>

<div class="sep"></div>
<button class="btn-go" id="btn-start">叩问此刻</button>
</div></div>

<!-- HUD -->
<div id="hud"><div class="hud-brand">下一个时辰</div><div class="hud-prog"><div class="hud-prog-top"><span>卦象</span><span id="hud-pct">0%</span></div><div class="hud-bar"><div class="hud-fill" id="hud-fill"></div></div></div><div class="hud-stat">命签 <b id="hud-holes">0</b></div><div class="hud-stat">拾 <b id="hud-chars">0</b> 字</div></div>
<canvas id="canvas"></canvas>
<div id="hint" style="display:none">轻触画布，落一枚命签</div>
<div id="ai-toast"><div class="spinner"></div><span id="ai-toast-text">时辰正在凝聚…</span></div>

<!-- Tune button -->
<div id="tune-btn" title="调参">⚙</div>

<!-- Tuning panel -->
<div id="tune">
<div class="tune-close"><span>实时调参</span><button onclick="document.getElementById('tune').classList.remove('open')">✕</button></div>
<h3>物理</h3>
<div id="tune-sliders"></div>
</div>

<!-- Reveal -->
<div id="reveal"><div class="rv-glow"></div><div class="rv-line"></div>
<div class="rv-tag">时 辰 之 签</div>
<div class="rv-sentence" id="rv-sent"></div>
<div class="rv-reason" id="rv-reason"></div>
<div class="rv-sep"></div>
<div class="rv-stats">
<div class="rv-stat"><div class="rv-num" id="rv-total">0</div><div class="rv-lbl">卦中字</div></div>
<div class="rv-stat"><div class="rv-num" id="rv-eaten">0</div><div class="rv-lbl">已拾取</div></div>
<div class="rv-stat"><div class="rv-num" id="rv-holes">0</div><div class="rv-lbl">命签数</div></div>
</div>
<button class="btn-again" onclick="location.reload()">再问一卦</button>
</div>

<script>
/* ═══════ TUNABLE CONFIG ═══════ */
const T={
  // 物理
  gravity:    {v:200, min:50,  max:2000, step:50,  label:'引力强度',     group:'物理'},
  attractR:   {v:70, min:50,  max:500,  step:10,  label:'吸引半径',     group:'物理'},
  consumeR:   {v:0.4, min:0.3, max:2.0,  step:0.1, label:'吞噬距离(×字宽)', group:'物理'},
  swirlStr:   {v:0.25,min:0,   max:1.0,  step:0.05,label:'漩涡强度',     group:'物理'},
  mergeD:     {v:55,  min:20,  max:150,  step:5,   label:'融合距离',     group:'物理'},
  idleTime:   {v:3.5, min:1,   max:10,   step:0.5, label:'空域消散(秒)', group:'物理'},
  fadeDur:    {v:1.8, min:0.5, max:5,    step:0.1, label:'消散速度(秒)', group:'物理'},
  // 运动
  baseSpeed:  {v:150,  min:10,  max:200,  step:5,   label:'基础速度',     group:'运动'},
  seekBoost:  {v:75,  min:0,   max:150,  step:5,   label:'觅食加速',     group:'运动'},
  seekRange:  {v:350, min:50,  max:800,  step:25,  label:'嗅觉范围',     group:'运动'},
  returnStr:  {v:0.6, min:0,   max:3.0,  step:0.1, label:'回弹力度',     group:'运动'},
  fallGrav:   {v:120, min:0,   max:500,  step:10,  label:'坠落重力',     group:'运动'},
  // 文字
  fontSize:   {v:15,  min:10,  max:28,   step:1,   label:'字号',         group:'文字'},
  fontFamily: {v:'Long Cang', type:'select', label:'字体', group:'文字',
    options:[
      {v:'Noto Serif SC',   label:'思源宋体'},
      {v:'Noto Sans SC',    label:'思源黑体'},
      {v:'ZCOOL XiaoWei',   label:'站酷小薇'},
      {v:'ZCOOL KuaiLe',    label:'站酷快乐'},
      {v:'Ma Shan Zheng',   label:'马善政楷书'},
      {v:'Liu Jian Mao Cao',label:'流建毛草'},
      {v:'Long Cang',       label:'龙藏'},
      {v:'Zhi Mang Xing',   label:'芝忙行'},
      {v:'Georgia',         label:'Georgia'},
      {v:'SimSun',          label:'宋体(系统)'},
      {v:'KaiTi',           label:'楷体(系统)'},
      {v:'SimHei',          label:'黑体(系统)'},
      {v:'FangSong',        label:'仿宋(系统)'},
    ]},
  fontWeight: {v:300, min:300, max:900,  step:100, label:'字重',         group:'文字'},
  alphaMin:   {v:0.25,min:0.05,max:0.8,  step:0.05,label:'最浅透明度',   group:'文字'},
  alphaMax:   {v:0.95,min:0.3, max:1.0,  step:0.05,label:'最深透明度',   group:'文字'},
  inkDarkR:   {v:18,  min:0,   max:80,   step:2,   label:'深墨R',       group:'文字'},
  inkDarkG:   {v:14,  min:0,   max:80,   step:2,   label:'深墨G',       group:'文字'},
  inkDarkB:   {v:10,  min:0,   max:80,   step:2,   label:'深墨B',       group:'文字'},

function buildTunePanel(){
  const container=document.getElementById('tune-sliders');
  container.innerHTML='';
  const groups={};
  for(const[k,c]of Object.entries(T)){if(!groups[c.group])groups[c.group]=[];groups[c.group].push(k)}
  let first=true;
  for(const[group,keys]of Object.entries(groups)){
    if(!first){const h=document.createElement('h3');h.textContent=group;container.appendChild(h)}
    else{document.querySelector('#tune h3').textContent=Object.keys(groups)[0];first=false}
    for(const k of keys){
      const c=T[k];
      const row=document.createElement('div');row.className='tune-row';
      const lbl=document.createElement('span');lbl.className='tune-label';lbl.textContent=c.label;
      row.appendChild(lbl);

      if(c.type==='select'){
        // Dropdown
        const sel=document.createElement('select');sel.className='tune-select';
        for(const opt of c.options){
          const o=document.createElement('option');o.value=opt.v;o.textContent=opt.label;
          o.style.fontFamily=opt.v;
          if(opt.v===c.v)o.selected=true;
          sel.appendChild(o);
        }
        sel.addEventListener('change',()=>{c.v=sel.value});
        row.appendChild(sel);
      }else{
        // Slider
        const valSpan=document.createElement('span');valSpan.className='tune-val';valSpan.textContent=c.v;valSpan.id='tv-'+k;
        const slider=document.createElement('input');slider.type='range';slider.className='tune-slider';
        slider.min=c.min;slider.max=c.max;slider.step=c.step;slider.value=c.v;
        slider.addEventListener('input',()=>{c.v=parseFloat(slider.value);valSpan.textContent=c.v});
        row.appendChild(slider);row.appendChild(valSpan);
      }
      container.appendChild(row);
    }
  }
}
buildTunePanel();

复为奇善复为妖人之迷其日固久是以圣人方而不割廉而不刿直而不肆光而不耀治人事天莫若啬夫唯啬是谓早服早服谓之重积德重积德则无不克无不克则莫知其极莫知其极可以有国有国之母可以长久是谓深根固柢长生久视之道治大国若烹小鲜以道莅天下其鬼不神非其鬼不神其神不伤人非其神不伤人圣人亦不伤人夫两不相伤故德交归焉大国者下流天下之交天下之牝牝常以静胜牡以静为下故大国以下小国则取小国小国以下大国则取大国故或下以取或下而取大国不过欲兼畜人小国不过欲入事人夫两者各得其所欲大者宜为下道者万物之奥善人之宝不善人之所保美言可以市尊美行可以加人人之不善何弃之有故立天子置三公虽有拱璧以先驷马不如坐进此道古之所以贵此道者何不曰求以得有罪以免邪故为天下贵为无为事无事味无味大小多少报怨以德图难于其易为大于其细天下难事必作于易天下大事必作于细是以圣人终不为大故能成其大夫轻诺必寡信多易必多难是以圣人犹难之故终无难矣其安易持其未兆易谋其脆易泮其微易散为之于未有治之于未乱合抱之木生于毫末九层之台起于垒土千里之行始于足下为者败之执者失之是以圣人无为故无败无执故无失民之从事常于几成而败之慎终如始则无败事是以圣人欲不欲不贵难得之货学不学复众人之所过以辅万物之自然而不敢为古之善为道者非以明民将以愚之民之难治以其智多故以智治国国之贼不以智治国国之福知此两者亦稽式常知稽式是谓玄德玄德深矣远矣与物反矣然后乃至大顺江海所以能为百谷王者以其善下之故能为百谷王是以欲上民必以言下之欲先民必以身后之是以圣人处上而民不重处前而民不害是以天下乐推而不厌以其不争故天下莫能与之争天下皆谓我道大似不肖夫唯大故似不肖若肖久矣其细也夫我有三宝持而保之一曰慈二曰俭三曰不敢为天下先慈故能勇俭故能广不敢为天下先故能成器长今舍慈且勇舍俭且广舍后且先死矣夫慈以战则胜以守则固天将救之以慈卫之善为士者不武善战者不怒善胜敌者不与善用人者为之下是谓不争之德是谓用人之力是谓配天古之极用兵有言吾不敢为主而为客不敢进寸而退尺是谓行无行攘无臂仍无敌执无兵祸莫大于轻敌轻敌几丧吾宝故抗兵相加哀者胜矣吾言甚易知甚易行天下莫能知莫能行言有宗事有君夫唯无知是以不我知知我者稀则我者贵是以圣人披褐而怀玉知不知尚矣不知知病矣夫唯病病是以不病圣人不病以其病病是以不病民不畏威则大威至无狭其所居无厌其所生夫唯无厌是以不厌是以圣人自知不自见自爱不自贵故去彼取此勇于敢则杀勇于不敢则活此两者或利或害天之所恶孰知其故是以圣人犹难之天之道不争而善胜不言而善应不召而自来默然而善谋天网恢恢疏而不失民不畏死奈何以死惧之若使民常畏死而为奇者吾得执而杀之孰敢常有司杀者杀夫代司杀者杀是谓代大匠斫夫代大匠斫者希有不伤其手矣民之饥以其上食税之多是以饥民之难治以其上之有为是以难治民之轻死以其上求生之厚是以轻死夫唯无以生为者是贤于贵生人之生也柔弱其死也坚强万物草木之生也柔脆其死也枯槁故坚强者死之徒柔弱者生之徒是以兵强则不胜木强则折强大处下柔弱处上天之道其犹张弓欤高者抑之下者举之有余者损之不足者补之天之道损有余而补不足人之道则不然损不足以奉有余孰能有余以奉天下唯有道者是以圣人为而不恃功成而不处其不欲见贤天下莫柔弱于水而攻坚强者莫之能胜其无以易之弱之胜强柔之胜刚天下莫不知莫能行是以圣人云受国之垢是谓社稷主受国不祥是为天下王正言若反和大怨必有余怨安可以为善是以圣人执左契而不责于人有德司契无德司彻天道无亲常与善人小国寡民使有什伯之器而不用使民重死而不远徙虽有舟舆无所乘之虽有甲兵无所陈之使人复结绳而用之甘其食美其服安其居乐其俗邻国相望鸡犬之声相闻民至老死不相往来信言不美美言不信善者不辩辩者不善知者不博博者不知圣人不积既以为人己愈有既以与人己愈多天之道利而不害圣人之道为而不争',xiaoyaoyou:'北冥有鱼其名为鲲鲲之大不知其几千里也化而为鸟其名为鹏鹏之背不知其几千里也怒而飞其翼若垂天之云是鸟也海运则将徙于南冥南冥者天池也齐谐者志怪者也谐之言曰鹏之徙于南冥也水击三千里抟扶摇而上者九万里去以六月息者也野马也尘埃也生物之以息相吹也天之苍苍其正色邪其远而无所至极邪其视下也亦若是则已矣且夫水之积也不厚则其负大舟也无力覆杯水于坳堂之上则芥为之舟置杯焉则胶水浅而舟大也风之积也不厚则其负大翼也无力故九万里则风斯在下矣而后乃今培风背负青天而莫之夭阏者而后乃今将图南蜩与学鸠笑之曰我决起而飞抢榆枋时则不至而控于地而已矣奚以之九万里而南为适莽苍者三餐而反腹犹果然适百里者宿舂粮适千里者三月聚粮之二虫又何知小知不及大知小年不及大年奚以知其然也朝菌不知晦朔蟪蛄不知春秋此小年也楚之南有冥灵者以五百岁为春五百岁为秋上古有大椿者以八千岁为春八千岁为秋而彭祖乃今以久特闻众人匹之不亦悲乎汤之问棘也是已穷发之北有冥海者天池也有鱼焉其广数千里未有知其修者其名为鲲有鸟焉其名为鹏背若太山翼若垂天之云抟扶摇羊角而上者九万里绝云气负青天然后图南且适南冥也斥笑之曰彼且奚适也我腾跃而上不过数仞而下翱翔蓬蒿之间此亦飞之至也而彼且奚适也此小大之辩也故夫知效一官行比一乡德合一君而征一国者其自视也亦若此矣而宋荣子犹然笑之且举世而誉之而不加劝举世而非之而不加沮定乎内外之分辩乎荣辱之境斯已矣彼其于世未数数然也虽然犹有未树也夫列子御风而行泠然善也旬有五日而后反彼于致福者未数数然也此虽免乎行犹有所待者也若夫乘天地之正而御六气之辩以游无穷者彼且恶乎待哉故曰至人无己神人无功圣人无名尧让天下于许由曰日月出矣而爝火不息其于光也不亦难乎时雨降矣而犹浸灌其于泽也不亦劳乎夫子立而天下治而我犹尸之吾自视缺然请致天下许由曰子治天下天下既已治也而我犹代子吾将为名乎名者实之宾也吾将为宾乎鹪鹩巢于深林不过一枝偃鼠饮河不过满腹归休乎君予无所用天下为庖人虽不治庖尸祝不越樽俎而代之矣肩吾问于连叔曰吾闻言于接舆大而无当往而不返吾惊怖其言犹河汉而无极也大有径庭不近人情焉连叔曰其言谓何哉曰藐姑射之山有神人居焉肌肤若冰雪绰约若处子不食五谷吸风饮露乘云气御飞龙而游乎四海之外其神凝使物不疵疠而年谷熟吾以是狂而不信也连叔曰然瞽者无以与乎文章之观聋者无以与乎钟鼓之声岂唯形骸有聋盲哉夫知亦有之是其言也犹时女也之人也之德也将旁礴万物以为一世蕲乎乱孰弊弊焉以天下为事之人也物莫之伤大浸稽天而不溺大旱金石流土山焦而不热是其尘垢秕糠将犹陶铸尧舜者也孰肯以物为事宋人资章甫而适诸越越人断发文身无所用之尧治天下之民平海内之政往见四子藐姑射之山汾水之阳窅然丧其天下焉惠子谓庄子曰魏王贻我大瓠之种我树之成而实五石以盛水浆其坚不能自举也剖之以为瓢则瓠落无所容非不呺然大也吾为其无用而掊之庄子曰夫子固拙于用大矣宋人有善为不龟手之药者世世以洴澼为事客闻之请买其方百金聚族而谋曰我世世为洴澼不过数金今一朝而鬻技百金请与之客得之以说吴王越有难吴王使之将冬与越人水战大败越人裂地而封之能不龟手一也或以封或不免于洴澼则所用之异也今子有五石之瓠何不虑以为大樽而浮乎江湖而忧其瓠落无所容则夫子犹有蓬之心也夫惠子谓庄子曰吾有大树人谓之樗其大本拥肿而不中绳墨其小枝卷曲而不中规矩立之涂匠者不顾今子之言大而无用众所同去也庄子曰子独不见狸狌乎卑身而伏以候敖者东西跳梁不辟高下中于机辟死于罔罟今夫牛其大若垂天之云此能为大矣而不能执鼠今子有大树患其无用何不树之于无何有之乡广莫之野彷徨乎无为其侧逍遥乎寝卧其下不夭斤斧物无害者无所可用安所困苦哉',songci:'雨恨云愁江南依旧称佳丽水村渔市一缕孤烟细天际征鸿遥认行如缀平生事此时凝睇谁会凭栏意长忆西湖尽日凭栏楼上望三三两两钓鱼舟岛屿正清秋笛声依约芦花里白鸟成行忽惊起别来闲整钓鱼竿思入水云寒长忆观潮满郭人争江上望来疑沧海尽成空万面鼓声中弄潮儿向涛头立手把红旗旗不湿别来几向梦中看梦觉尚心寒波渺渺柳依依孤村芳草远斜日杏花飞江南春尽离肠断满汀洲人未归吴山青越山青两岸青山相送迎谁知离别情君泪盈妾泪盈罗带同心结未成江头潮已平碧云天黄叶地秋色连波波上寒烟翠山映斜阳天接水芳草无情更在斜阳外黯乡魂追旅思夜夜除非好梦留人睡明月楼高休独倚酒入愁肠化作相思泪塞下秋来风景异衡阳雁去无留意四面边声连角起千嶂里长烟落日孤城闭浊酒一杯家万里燕然未勒归无计羌管悠悠霜满地人不寐将军白发征夫泪纷纷坠叶飘香砌夜寂静寒声碎真珠帘卷玉楼空天淡银河垂地年年今夜月华如练长是人千里愁肠已断无由醉酒未到先成泪残灯明灭枕头一曲新词酒一杯去年天气旧亭台夕阳西下几时回无可奈何花落去似曾相识燕归来小园香径独徘徊小径红稀芳郊绿遍高台树色阴阴见春风不解禁杨花蒙蒙乱扑行人面翠叶藏莺朱帘隔燕炉香静逐游丝转一场愁梦酒醒时斜阳却照深深院槛菊愁烟兰泣露罗幕轻寒燕子双飞去明月不谙离恨苦斜光到晓穿朱户昨夜西风凋碧树独上高楼望尽天涯路欲寄彩笺兼尺素山长水阔知何处燕子来时新社梨花落后清明池上碧苔三四点叶底黄鹂一两声日长飞絮轻巧笑东邻女伴采桑径里逢迎疑怪昨宵春梦好元是今朝斗草赢笑从双脸生家住西秦赌薄艺随身花柳上斗尖新偶学念奴声调有时高遏行云蜀锦缠头无数不负辛勤数年来往咸京道残杯冷炙谩消魂衷肠事托何人若有知音见采不辞遍唱阳春一曲当筵落泪重掩罗巾乍暖还轻冷风雨晚来方定庭轩寂寞近清明残花中酒又是去年病楼头画角风吹醒入夜重门静那堪更被明月隔墙送过秋千影时为嘉禾小倅以病眠不赴府会水调数声持酒听午醉醒来愁未醒送春春去几时回临晚镜伤流景往事后期空记省沙上并禽池上暝云破月来花弄影重重帘幕密遮灯风不定人初静明日落红应满径龙头舴艋吴儿竞笋柱秋千游女并芳洲拾翠暮忘归秀野踏青来不定行云去后遥山暝已放笙歌池院静中庭月色正清明无数杨花过无影一带江山如画风物向秋潇洒水浸碧天何处断霁色冷光相射蓼屿荻花洲掩映竹篱茅舍云际客帆高挂烟外酒旗低亚多少六朝兴废事尽入渔樵闲话怅望倚层楼寒日无言西下皱波纹迎客棹绿杨烟外晓寒轻红杏枝头春意闹浮生长恨欢娱少肯爱千金轻一笑为君持酒劝斜阳且 function buildP(text){

  FS=T.fontSize.v;LH=FS*1.35;CW=FS*.8;

  let t=text.replace(/[\n\r\s]/g,'');const maxP=isPhone?1800:isTablet?6000:COLS*ROWS;const need=Math.min(COLS*ROWS,maxP);
  while(t.length<need)t+=t;t=t.slice(0,need);const ch=[...t];
  const aMin=T.alphaMin.v,aRange=T.alphaMax.v-aMin;
  for(let c=0;c<COLS;c++)colMap[c]=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const i=r*COLS+c;if(i>=ch.length)break;

/* Reflow: recalculate target y for each column — alive chars settle downward */
function reflowColumns(){
  for(let c=0;c<COLS;c++){
    const col=colMap[c];
    // Collect alive particles, keep their column order
    const alive=col.filter(p=>!p.dead);
    // Stack from bottom: last alive gets bottom slot, etc.
    const bottomY=4+(ROWS-1)*LH+LH*.5;
    for(let i=alive.length-1,slot=col.length-1;i>=0;i--,slot--){
      alive[i].ty=4+slot*LH+LH*.5;
    }
  }
}

function physics(dt){
  if(!started||ended)return;
  const G=T.gravity.v,AR=T.attractR.v,CD=CW*T.consumeR.v,MD=T.mergeD.v,IT=T.idleTime.v,FD=T.fadeDur.v;
  const SR=T.seekRange.v,BS=T.baseSpeed.v,SB=T.seekBoost.v;

  // Update splashes
  for(let i=splashes.length-1;i>=0;i--){const s=splashes[i];s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=180*dt;s.life-=dt;s.r*=.97;if(s.life<=0)splashes.splice(i,1)}
  // Update trail
  for(let i=trail.length-1;i>=0;i--){trail[i].life-=dt;trail[i].r*=.985;if(trail[i].life<=0)trail.splice(i,1)}

  for(const h of holes){if(!h.alive)continue;h.age+=dt;h.mass=Math.min(h.mass+dt*.2,16);h.ph+=dt*1.6;h.mf=Math.max(h.mf-dt*1.5,0);
    const tR=T.initRadius.v+Math.sqrt(h.eaten)*T.growthRate.v;h.vR+=(tR-h.vR)*dt*2.5;

    // Wobble phases advance
    for(let i=0;i<h.wobble.length;i++)h.wobble[i]+=dt*(2.5+i*.7);

    // Jelly spring (bouncy feel)
    h.jellyV+=(-h.jellyD*18-h.jellyV*4)*dt;h.jellyD+=h.jellyV*dt;
    if(h.excitement>.2)h.jellyV+=dt*1.5; // pulse when excited

    // Evaporation shrink
    if(h.fade>0){h.shrinkScale=Math.max(1-h.fade*.6,0.2);
      // Tremble when evaporating
      for(let i=0;i<h.wobble.length;i++)h.wobble[i]+=dt*(5+h.fade*10);
    }else{h.shrinkScale+=(1-h.shrinkScale)*dt*3}

    // Trail emission
    h.trailT+=dt;const spd0=Math.sqrt(h.vx*h.vx+h.vy*h.vy);
    if(!isPhone&&h.trailT>.06&&spd0>15&&trail.length<60){h.trailT=0;
      trail.push({x:h.prevX,y:h.prevY,r:h.vR*.25+Math.random()*2,life:.6+Math.random()*.3,a:.12})}
    h.prevX=h.x;h.prevY=h.y;

    // Pile internal drift
    for(const ch of h.pile){ch.dx+=Math.sin(h.age*1.2+ch.rot)*dt*2;ch.dy+=Math.cos(h.age*0.9+ch.dx)*dt*1.5;ch.rot+=dt*.15*(Math.sin(h.age+ch.dy))}

    h.seekTimer+=dt;h.excitement=Math.max(h.excitement-dt*.8,0);
    if(h.seekTimer>.35){h.seekTimer=0;let sx=0,sy=0,sc=0;
      for(const p of particles){if(p.dead||!p.liked)continue;const dx=p.x-h.x,dy=p.y-h.y,d=Math.sqrt(dx*dx+dy*dy);if(d<SR&&d>5){const w=1/(d*.02+1);sx+=dx/d*w;sy+=dy/d*w;sc++}}
      if(sc>0){const mg=Math.sqrt(sx*sx+sy*sy);if(mg>0){h.vx=h.vx*.3+(sx/mg)*SB*.7+(Math.random()-.5)*10;h.vy=h.vy*.3+(sy/mg)*SB*.7+(Math.random()-.5)*10;h.excitement=Math.min(h.excitement+.3,1);h.jellyV+=2}}
      else{h.dt2+=.35;if(h.dt2>h.di){h.dt2=0;h.di=1+Math.random()*2.5;h.vx=(Math.random()-.5)*BS*1.4;h.vy=(Math.random()-.5)*BS*1.4}}}
    const spd=Math.sqrt(h.vx*h.vx+h.vy*h.vy),maxS=BS+SB;if(spd>maxS){h.vx=h.vx/spd*maxS;h.vy=h.vy/spd*maxS}
    h.x+=h.vx*dt;h.y+=h.vy*dt;
    if(h.x<25){h.x=25;h.vx=Math.abs(h.vx)*.8;h.jellyV+=3}if(h.x>W-25){h.x=W-25;h.vx=-Math.abs(h.vx)*.8;h.jellyV+=3}
    if(h.y<25){h.y=25;h.vy=Math.abs(h.vy)*.8;h.jellyV+=3}if(h.y>H-25){h.y=H-25;h.vy=-Math.abs(h.vy)*.8;h.jellyV+=3}
    let food=false;for(const p of particles){if(!p.dead&&Math.hypot(p.x-h.x,p.y-h.y)<AR){food=true;break}}
    if(!food){h.idle+=dt;if(h.idle>IT){h.fade+=dt/FD;if(h.fade>=1)h.alive=false}}else{h.idle=Math.max(h.idle-dt*2,0);h.fade=Math.max(h.fade-dt,0)}}

  // Merge with splashes
  const al=holes.filter(h=>h.alive);
  for(let i=0;i<al.length;i++)for(let j=i+1;j<al.length;j++){const a=al[i],b=al[j];if(!a.alive||!b.alive)continue;if(Math.hypot(a.x-b.x,a.y-b.y)<MD){const k=a.eaten>=b.eaten?a:b,g=a.eaten>=b.eaten?b:a;
    const mx=(k.x+g.x)*.5,my=(k.y+g.y)*.5;
    const tw=k.eaten+g.eaten+2;k.x=(k.x*(k.eaten+1)+g.x*(g.eaten+1))/tw;k.y=(k.y*(k.eaten+1)+g.y*(g.eaten+1))/tw;
    k.eaten+=g.eaten;k.mass=Math.min(k.mass+g.mass*.6,24);k.vx=(k.vx+g.vx)*.5;k.vy=(k.vy+g.vy)*.5;k.mf=1;k.idle=0;k.fade=0;k.pile=k.pile.concat(g.pile);k.jellyV+=5;g.alive=false;
    // Splash particles
    const splashN=isPhone?3:6;
    for(let s=0;s<splashN&&splashes.length<30;s++){const ang=Math.random()*Math.PI*2,spd=60+Math.random()*80;
      splashes.push({x:mx,y:my,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-40,r:2+Math.random()*3,life:.5+Math.random()*.3})}}}
  document.getElementById('hud-holes').textContent=holes.filter(h=>h.alive).length;

  let changed=false;const swirlS=T.swirlStr.v,retS=T.returnStr.v,fallG=T.fallGrav.v;
  for(const p of particles){if(p.dead)continue;let fx=0,fy=0,cH=null,cD=1e9;
    for(const h of holes){if(!h.alive)continue;const dx=h.x-p.x,dy=h.y-p.y,d=Math.sqrt(dx*dx+dy*dy);if(d<cD){cD=d;cH=h}
      if(d<AR&&d>1){const f=G*h.mass/(d*d),nx=dx/d,ny=dy/d;fx+=nx*f;fy+=ny*f;if(d<AR*.5){fx+=-ny*f*swirlS;fy+=nx*f*swirlS}}}

      const rr=cH.vR*.65;if(cH.pile.length>60)cH.pile.shift();cH.pile.push({c:p.c,dx:(Math.random()-.5)*rr*1.8,dy:(Math.random()-.5)*rr*1.8,rot:(Math.random()-.5)*2.5,sc:.5+Math.random()*.65,al:.35+Math.random()*.4})}
    else{p.vx=(p.vx+fx*dt)*.955;p.vy=(p.vy+fy*dt)*.955;
      const dy2=p.ty-p.y;if(dy2>1){p.vy+=fallG*dt}
      p.vx+=(p.ox-p.x)*dt*retS;p.vy+=(p.ty-p.y)*dt*retS;
      p.x+=p.vx*dt;p.y+=p.vy*dt;
      if(cD<AR*.5){p.ct=Math.min(p.ct+dt*2.5,1);p.ang=Math.atan2(cH.y-p.y,cH.x-p.x)}
      else{p.ct=Math.max(p.ct-dt*.6,0)}}}
  if(changed){reflowColumns();const pct=consumed.length/total;document.getElementById('hud-pct').textContent=(pct*100|0)+'%';document.getElementById('hud-fill').style.width=(pct*100)+'%';document.getElementById('hud-chars').textContent=consumed.length;if(consumed.length>=T.completeN.v&&!aiCalled){aiCalled=true;compose()}}
}

(defun 卜算时辰 (碎片 情绪)
  "从碎片中拾取字符，为问卦者的下一个时辰写一句签文"
  (let* ((当下 (感知情绪 情绪))
         (征兆 (从碎片中寻找呼应 当下 碎片))
         (签文 (一句话 (隐喻 (命理口吻 (指向未来一小时 征兆))))))
    ;; 不是算命，是用文字照见此刻的心
    ;; 不要说"一切都会好的"，要说出问卦者自己都没意识到的东西
    ;; 像周易：用意象暗示，不直说吉凶
    ;; 像庄子：用寓言说理，留有余味
    签文))

规则：
1. 只能使用碎片中出现的字符（每字最多用其出现次数）
2. 问卦者当下的情绪：${cfg.theme}
3. ${cfg.favs?'问卦者偏爱的意象：'+cfg.favs:'自由选择最有共鸣的字'}
4. 当前时辰：${sc.now}，签文指向：${sc.next}
5. 长度：8-25字。签文要短，像刻在竹简上
6. 要求：写一句给"下一个时辰"的签文。不是鸡汤，不是口号。是那种让人读完愣住、然后若有所悟的一句话。用命理的口吻，但说的是哲学的话。
7. 好的例子：
   - "雾散之前，光已经在了"
   - "你担心的事，十之八九不会发生"
   - "静水深处自有暗涌，但水面不必知道"
   - "所有的等待都在酝酿一场不期而遇"
8. 坏的例子（绝对不要写这种）：
   - "好运即将到来"
   - "一切都会好起来的"
   - "相信自己加油"

严格返回JSON（无markdown无代码块）：
{"sentence":"签文","reason":"一句话解签：这句话想告诉问卦者什么"}`;const resp=await fetch(cfg.apiUrl,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.apiKey},body:JSON.stringify({model:cfg.model||'moonshot-v1-32k',messages:[{role:'system',content:sys},{role:'user',content:'问卦者当下情绪：'+cfg.theme+'\n\n以下是命签拾取到的文字碎片（共'+consumed.length+'字）：\n'+consumed.join('')+'\n\n请卜算下一个时辰的签文。'}],temperature:.85,max_tokens:500})});const data=await resp.json();const raw=data.choices?.[0]?.message?.content||'';const cl=raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').replace(/[“”‘’]/g,'"').trim();let r;try{r=JSON.parse(cl)}catch{const sm=cl.match(/[""]sentence[""]?\s*[:：]\s*[""]([^""]+)[""]/);const rm=cl.match(/[""]reason[""]?\s*[:：]\s*[""]([^""]+)[""]/);r={sentence:sm?sm[1]:cl.replace(/[{}""":：,\s]/g,'').slice(0,40),reason:rm?rm[1]:''}}toast.classList.remove('show');showR(r);return}catch(e){toast.classList.remove('show')}}
  toast.classList.add('show');document.getElementById('ai-toast-text').textContent='时辰正在凝聚…';await new Promise(r=>setTimeout(r,800));const fA=cfg.favs?cfg.favs.replace(/[,，\s]+/g,' ').split(' ').filter(Boolean):[];const r=localCompose(consumed,cfg.theme,fA);toast.classList.remove('show');showR(r)}
function showR(d){ended=true;setTimeout(()=>{document.getElementById('rv-sent').textContent=d.sentence||'…';document.getElementById('rv-reason').textContent=d.reason?'— '+d.reason:'';document.getElementById('rv-total').textContent=total;document.getElementById('rv-eaten').textContent=consumed.length;document.getElementById('rv-holes').textContent=totalHC;document.getElementById('reveal').classList.add('show')},600)}

function render(){
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#F5F0E8';ctx.fillRect(0,0,W,H);
  if(!isPhone){const wg=ctx.createRadialGradient(W*.38,H*.32,0,W*.5,H*.5,Math.max(W,H)*.62);wg.addColorStop(0,'rgba(255,248,235,.5)');wg.addColorStop(.55,'rgba(245,240,232,.12)');wg.addColorStop(1,'rgba(237,230,218,.25)');ctx.fillStyle=wg;ctx.fillRect(0,0,W,H)}
  ctx.drawImage(grain(),0,0);
  if(!started)return;
  for(const s of stains){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(62,52,42,${s.a})`;ctx.fill()}
  const curFS=T.fontSize.v,curFW=T.fontWeight.v,curFF='"'+T.fontFamily.v+'","Georgia","SimSun",serif',dR=T.inkDarkR.v,dG=T.inkDarkG.v,dB=T.inkDarkB.v,shrk=T.shrinkFactor.v,rotI=T.rotIntensity.v;
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(const p of particles){if(p.dead)continue;ctx.save();ctx.translate(p.x,p.y);
    if(p.ct>0){ctx.rotate(p.ang*rotI);ctx.scale(1-p.ct*shrk,1-p.ct*shrk)}
    let minD=1e9;for(const h of holes){if(!h.alive)continue;const d=Math.hypot(h.x-p.x,h.y-p.y);if(d<minD)minD=d}
    let a=p.a;const ir=Math.floor(dR+(58-dR)*(1-a)),ig=Math.floor(dG+(50-dG)*(1-a)),ib=Math.floor(dB+(42-dB)*(1-a));
    if(minD<120){const t=1-minD/120;a=Math.min(p.a+t*.3,1);
      ctx.fillStyle=p.liked?'rgba('+Math.min(ir+130,220)+','+Math.min(ig+55,125)+','+Math.min(ib+35,80)+','+a+')':'rgba('+ir+','+ig+','+ib+','+a+')';
    }else{ctx.fillStyle=p.liked?'rgba('+Math.min(ir+110,200)+','+Math.min(ig+50,120)+','+Math.min(ib+30,75)+','+a+')':'rgba('+ir+','+ig+','+ib+','+a+')'}
    ctx.font=curFW+' '+curFS+'px '+curFF;ctx.fillText(p.c,0,0);ctx.restore()}
  // Trail droplets
  for(const t of trail){ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.fillStyle='rgba(140,130,115,'+(t.life*.2)+')';ctx.fill();
    ctx.beginPath();ctx.arc(t.x-t.r*.2,t.y-t.r*.25,t.r*.35,0,Math.PI*2);ctx.fillStyle='rgba(255,255,250,'+(t.life*.2)+')';ctx.fill()}

  // Splash particles
  for(const s of splashes){ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle='rgba(160,150,135,'+(s.life*.5)+')';ctx.fill();
    ctx.beginPath();ctx.arc(s.x-s.r*.2,s.y-s.r*.3,s.r*.3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,250,'+(s.life*.3)+')';ctx.fill()}

  // Water drops — Ink Bead
  for(const h of holes){if(!h.alive)continue;
    const op=1-h.fade;
    const baseR=h.vR*h.shrinkScale*(1+h.jellyD*.08);
    const spd=Math.sqrt(h.vx*h.vx+h.vy*h.vy);
    const moveAng=Math.atan2(h.vy,h.vx);
    // Squash & stretch factor based on speed
    const stretch=1+Math.min(spd*.003,.22);
    const squash=1/Math.sqrt(stretch);

    ctx.save();ctx.globalAlpha=op;ctx.translate(h.x,h.y);ctx.rotate(moveAng);
    // Now we work in local coords where movement direction = +x

    // Helper: draw wobbly circle path (arrow fn — Safari crashes on function decl in block scope)
    const wobblePath=(R,intensity)=>{
      ctx.beginPath();
      if(isPhone){ctx.arc(0,0,R*stretch,0,Math.PI*2);ctx.closePath();return}
      const n=36;
      for(let i=0;i<=n;i++){
        const a=i/n*Math.PI*2;
        let wr=0;for(let k=0;k<h.wobble.length;k++){wr+=Math.sin(a*(k+2)+h.wobble[k])*(intensity/(k+1))}
        const rr=R+wr;
        const px=Math.cos(a)*rr*stretch;
        const py=Math.sin(a)*rr*squash;
        i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
      }ctx.closePath();
    };

    // 1. Contact shadow + 2. Caustic (skip on phones to save GPU)
    if(!isPhone){
      ctx.save();ctx.rotate(-moveAng);
      const shR=baseR+5;
      const csG=ctx.createRadialGradient(3,baseR*.2,baseR*.6,3,baseR*.2,shR);
      csG.addColorStop(0,'rgba(50,42,35,0)');csG.addColorStop(.55,'rgba(50,42,35,.08)');csG.addColorStop(.8,'rgba(50,42,35,.13)');csG.addColorStop(1,'rgba(50,42,35,0)');
      ctx.beginPath();ctx.ellipse(3,baseR*.2,shR*1.1,shR*.7,0,0,Math.PI*2);ctx.fillStyle=csG;ctx.fill();
      ctx.restore();
      ctx.save();ctx.rotate(-moveAng);
      const cauG=ctx.createRadialGradient(0,0,0,0,0,baseR*.6);cauG.addColorStop(0,'rgba(255,250,240,.1)');cauG.addColorStop(1,'rgba(255,250,240,0)');
      ctx.beginPath();ctx.arc(0,0,baseR*.6,0,Math.PI*2);ctx.fillStyle=cauG;ctx.fill();
      ctx.restore();
    }else{
      // Phone: simple dark circle shadow
      ctx.save();ctx.rotate(-moveAng);
      ctx.beginPath();ctx.arc(2,baseR*.15,baseR+3,0,Math.PI*2);
      ctx.fillStyle='rgba(50,42,35,.08)';ctx.fill();
      ctx.restore();
    }

    // 3. Drop body — wobbly outline with edge darkening
    const bodyG=ctx.createRadialGradient(-baseR*.1*squash,-baseR*.1*squash,0,0,0,baseR);
    bodyG.addColorStop(0,'rgba(250,248,245,.06)');bodyG.addColorStop(.55,'rgba(245,240,232,.04)');
    bodyG.addColorStop(.85,'rgba(190,180,165,.09)');bodyG.addColorStop(1,'rgba(150,140,125,.2)');
    wobblePath(baseR,1.5);ctx.fillStyle=bodyG;ctx.fill();

    // 4. Rainbow iridescent rim (with fallback for older browsers)
    if(!isPhone&&ctx.createConicGradient){
      ctx.save();
      const iriG=ctx.createConicGradient(h.age*.3,0,0);
      iriG.addColorStop(0,'rgba(255,180,180,.12)');iriG.addColorStop(.17,'rgba(255,220,150,.10)');
      iriG.addColorStop(.33,'rgba(200,255,200,.08)');iriG.addColorStop(.5,'rgba(170,200,255,.10)');
      iriG.addColorStop(.67,'rgba(220,180,255,.08)');iriG.addColorStop(.83,'rgba(255,180,200,.10)');
      iriG.addColorStop(1,'rgba(255,180,180,.12)');
      wobblePath(baseR,1.5);ctx.strokeStyle=iriG;ctx.lineWidth=1.5;ctx.stroke();
      ctx.restore();
    }

    // 5. Excitement glow
    if(h.excitement>.05){
      ctx.save();ctx.rotate(-moveAng);
      const exG=ctx.createRadialGradient(0,0,baseR*.4,0,0,baseR+8);
      exG.addColorStop(0,'rgba(196,131,106,'+(.1*h.excitement)+')');exG.addColorStop(1,'rgba(196,131,106,0)');
      ctx.beginPath();ctx.arc(0,0,baseR+8,0,Math.PI*2);ctx.fillStyle=exG;ctx.fill();
      ctx.restore();
    }

    // 6. Merge flash
    if(h.mf>0){ctx.save();ctx.rotate(-moveAng);
      ctx.beginPath();ctx.arc(0,0,baseR+h.mf*22,0,Math.PI*2);ctx.fillStyle='rgba(230,225,215,'+(.18*h.mf)+')';ctx.fill();
      ctx.restore()}

    // 7. Internal pile of jumbled chars (clipped to wobbly shape)
    ctx.save();
    wobblePath(baseR-1,1.5);ctx.clip();
    ctx.rotate(-moveAng); // render chars upright
    ctx.textAlign='center';ctx.textBaseline='middle';
    const maxS=Math.min(h.pile.length,isPhone?40:80),bR=T.initRadius.v+Math.sqrt(Math.max(h.eaten-1,0))*T.growthRate.v;
    const sf=baseR/bR;
    // Top-to-bottom gradient overlay via char alpha
    for(let i=h.pile.length-maxS;i<h.pile.length;i++){
      const ch=h.pile[i];
      const cx=ch.dx*sf,cy=ch.dy*sf;
      const dfc=Math.sqrt(cx*cx+cy*cy);
      const ef=1-Math.min(dfc/baseR,.95);
      // Arc distortion: push chars outward near edge (fisheye)
      const distort=1+dfc/(baseR*3);
      const ax=cx*distort,ay=cy*distort;
      // Vertical gradient: upper=brighter, lower=darker
      const vertFade=1-(ay/baseR*.3+.3);
      const fs2=T.fontSize.v*ch.sc*(.6+ef*.6);
      ctx.save();ctx.translate(ax,ay);ctx.rotate(ch.rot);
      ctx.font='600 '+fs2+'px '+curFF;
      ctx.fillStyle='rgba(30,25,18,'+(ch.al*(.4+ef*.4)*Math.max(vertFade,.3))+')';
      ctx.fillText(ch.c,0,0);ctx.restore();
    }
    ctx.restore(); // un-clip

    // 8. Glass edge — dark contact line + inner bright line
    wobblePath(baseR,1.5);ctx.strokeStyle='rgba(110,100,88,.22)';ctx.lineWidth=1.4;ctx.stroke();
    if(!isPhone){wobblePath(baseR-.8,1.5);ctx.strokeStyle='rgba(255,252,248,.08)';ctx.lineWidth=.6;ctx.stroke()}

    // 9. Highlights
    if(isPhone){
      // Phone: one simple highlight
      ctx.save();ctx.rotate(-moveAng);
      ctx.beginPath();ctx.arc(-baseR*.25,-baseR*.28,baseR*.35,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,252,.25)';ctx.fill();
      ctx.restore();
    }else{
      ctx.save();ctx.rotate(-moveAng);
      ctx.save();ctx.rotate(moveAng);wobblePath(baseR,1.5);ctx.clip();ctx.rotate(-moveAng);
      const hlOx=-baseR*.28,hlOy=-baseR*.32;
      const hlG=ctx.createRadialGradient(hlOx,hlOy,0,hlOx,hlOy,baseR*.55);
      hlG.addColorStop(0,'rgba(255,255,252,.32)');hlG.addColorStop(.35,'rgba(255,255,250,.10)');hlG.addColorStop(1,'rgba(255,255,250,0)');
      ctx.beginPath();ctx.ellipse(hlOx,hlOy,baseR*.44,baseR*.28,-.3,0,Math.PI*2);ctx.fillStyle=hlG;ctx.fill();
      const dotX=-baseR*.2,dotY=-baseR*.26;
      const dotG=ctx.createRadialGradient(dotX,dotY,0,dotX,dotY,baseR*.1);
      dotG.addColorStop(0,'rgba(255,255,255,.55)');dotG.addColorStop(1,'rgba(255,255,255,0)');
      ctx.beginPath();ctx.arc(dotX,dotY,baseR*.1,0,Math.PI*2);ctx.fillStyle=dotG;ctx.fill();
      const brY=baseR*.38;
      const brG=ctx.createRadialGradient(baseR*.08,brY,0,baseR*.08,brY,baseR*.28);
      brG.addColorStop(0,'rgba(248,240,228,.07)');brG.addColorStop(1,'rgba(248,240,228,0)');
      ctx.beginPath();ctx.ellipse(baseR*.08,brY,baseR*.26,baseR*.1,.2,0,Math.PI*2);ctx.fillStyle=brG;ctx.fill();
      ctx.restore();ctx.restore();
    }

    ctx.restore(); // main transform

    // 10. Evaporation warning ring
    if(h.idle>2&&h.fade<.1){const w=Math.sin(h.age*5)*.3+.7;ctx.beginPath();ctx.arc(h.x,h.y,baseR+2,0,Math.PI*2);ctx.strokeStyle='rgba(180,170,155,'+(.05*w)+')';ctx.lineWidth=.4;ctx.stroke()}
  }
  holes=holes.filter(h=>h.alive);
}

let lastT=performance.now();
let errCount=0;
let frameSkip=0;
(function loop(ts){
  if(isPhone&&++frameSkip%2!==0){requestAnimationFrame(loop);return}
  try{const dt=Math.min((ts-lastT)/1000,.1);lastT=ts;physics(dt);render()}catch(e){if(errCount++<3)console.warn('frame error:',e)}
  requestAnimationFrame(loop);
})(lastT);
</script>
